<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png?v=20260306-2">
  <link rel="shortcut icon" href="/favicon.ico?v=20260306-2">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png?v=20260306-2">
  <link rel="apple-touch-icon-precomposed" sizes="180x180" href="/apple-touch-icon-precomposed.png?v=20260306-2">
  <title>FloPo Activity Writer</title>
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap");

    :root {
      --bg: #f6f3ea;
      --paper: #f2f2f2;
      --ink: #1f2a1f;
      --accent: #2f6f4f;
      --muted: #6d746d;
      --line: #d9d2c2;
      --border: 1.5px solid #191919;
    }
    body { margin: 0; font-family: "Fredoka", "Times New Roman", serif; font-weight: 400; background: linear-gradient(160deg,#f6f3ea,#ece7d7); color: var(--ink); }
    .wrap { max-width: 1000px; margin: 32px auto; padding: 20px; }
    .card { box-sizing: border-box; background: var(--paper); border: var(--border); box-shadow: 0px 2px 2px rgba(13, 11, 5, 0.15), inset 0px 2px 0px rgba(255, 255, 255, 0.2), inset 0px -2px 0px rgba(13, 11, 5, 0.15); border-radius: 8px; padding: 20px; }
    h1, h2, h3, h4, h5, h6 { font-weight: 600; }
    h1 { margin-top: 0; font-size: 2rem; }
    label { display:block; margin: 10px 0 6px; font-weight: 600; }
    textarea, input { width: 100%; box-sizing: border-box; border: var(--border); border-radius: 10px; padding: 10px; font: inherit; background:#fff; }
    textarea { min-height: 220px; }
    .btns { display:flex; gap:10px; margin-top:16px; flex-wrap: wrap; }
    .button, button { display: flex; flex-direction: row; justify-content: center; align-items: center; padding: 10px 24px; gap: 8px; border: var(--border); box-shadow: 0px 2px 2px rgba(13, 11, 5, 0.15), inset 0px 4px 0px rgba(255, 255, 255, 0.2), inset 0px -5px 0px rgba(13, 11, 5, 0.15); border-radius: 12px; cursor:pointer; font: inherit; font-weight: 600; }
    .primary { background: #D2FFFF; color:#203427; }
    .secondary { background: #F2F2F2; color:#203427; }
    .mono { white-space: pre-wrap; font-family: Consolas, monospace; font-size: .9rem; background:#f2efe6; border: var(--border); border-radius: 8px; padding: 10px; margin-top:12px; max-height: 300px; overflow:auto; }
    #report { display: none; margin-top: 12px; }
    #report.is-visible { display: block; }
    .report-list { display: grid; gap: 10px; }
    .report-item {
      background: #fffaf2;
      border: var(--border);
      border-radius: 10px;
      padding: 12px;
    }
    .report-item h3 { margin: 0 0 6px; font-size: 1rem; }
    .report-item p { margin: 0; color: #364236; font-size: .92rem; line-height: 1.4; }
    .report-item ul { margin: 8px 0 0; padding-left: 18px; }
    .report-item li { margin: 4px 0; line-height: 1.4; }
    .sections { display: none; margin-top: 14px; border: var(--border); border-radius: 10px; background:#fff; max-height: 520px; overflow:auto; }
    .sections.is-visible { display: block; }
    .section { padding: 12px 14px; border-bottom: 1.5px solid #ece6d8; }
    .section:last-child { border-bottom: none; }
    .section h3 { margin: 0 0 8px; font-size: 1rem; }
    .section p { margin: 0; white-space: pre-wrap; line-height: 1.45; }
    .muted { color: var(--muted); font-size: .9rem; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>FloPo Activity Writer</h1>
      <p class="muted">Paste notes, generate a validated draft, then push to Notion and/or Webflow as a draft.</p>
      <label for="notes">Notes</label>
      <textarea id="notes" placeholder="Write notes here..."></textarea>
      <div class="btns">
        <button class="primary" id="generateBtn">Generate</button>
        <button class="secondary" id="notionBtn">Push To Notion</button>
      </div>
      <div id="status" class="muted" style="margin-top:10px;"></div>
      <div id="report"></div>
      <div id="sections" class="sections"></div>
    </div>
  </div>
  <script>
    let latestDraft = null;

    const byId = (id) => document.getElementById(id);
    function setStatusWithNotionLink(prefix, notionUrl, suffix = "") {
      const status = byId("status");
      status.innerHTML = "";
      status.append(prefix);

      const link = document.createElement("a");
      link.href = notionUrl;
      link.textContent = "View here";
      link.target = "_blank";
      link.rel = "noopener noreferrer";
      status.appendChild(link);

      if (suffix) {
        status.append(suffix);
      }
    }

    function startGenerationTicker() {
      let running = true;
      let tick = 0;
      let displayedMessage = "Starting generation";
      const messageQueue = [];
      let shownAt = Date.now();
      const minDisplayMs = 3000;

      const drawTimer = setInterval(() => {
        if (!running) return;
        if (messageQueue.length && Date.now() - shownAt >= minDisplayMs) {
          displayedMessage = messageQueue.shift();
          shownAt = Date.now();
          tick = 0;
        }
        tick = (tick + 1) % 4;
        byId("status").textContent = `${displayedMessage}${".".repeat(tick)}`;
      }, 300);

      const pollTimer = setInterval(async () => {
        if (!running) return;
        try {
          const res = await fetch("/api/generation-status", { cache: "no-store" });
          if (!res.ok) return;
          const data = await res.json();
          if (data && data.message) {
            const queuedLast = messageQueue.length ? messageQueue[messageQueue.length - 1] : null;
            if (data.message !== displayedMessage && data.message !== queuedLast) {
              messageQueue.push(data.message);
            }
          }
        } catch (_) {
        }
      }, 700);

      return () => {
        running = false;
        clearInterval(drawTimer);
        clearInterval(pollTimer);
      };
    }

    function renderSections(activityDraft) {
      const container = byId("sections");
      container.innerHTML = "";
      container.classList.remove("is-visible");
      if (!activityDraft) return;
      Object.entries(activityDraft).forEach(([title, value]) => {
        const section = document.createElement("section");
        section.className = "section";
        const h3 = document.createElement("h3");
        h3.textContent = title;
        const p = document.createElement("p");
        p.textContent = value || "";
        section.appendChild(h3);
        section.appendChild(p);
        container.appendChild(section);
      });
      if (container.childElementCount) {
        container.classList.add("is-visible");
      }
    }

    function clearReport() {
      const report = byId("report");
      report.innerHTML = "";
      report.classList.remove("is-visible");
    }

    function renderReport(items) {
      const report = byId("report");
      if (!items.length) {
        clearReport();
        return;
      }

      report.innerHTML = "";
      const list = document.createElement("div");
      list.className = "report-list";

      items.forEach((item) => {
        const card = document.createElement("section");
        card.className = "report-item";

        const title = document.createElement("h3");
        title.textContent = item.title;
        card.appendChild(title);

        if (item.body) {
          const body = document.createElement("p");
          body.textContent = item.body;
          card.appendChild(body);
        }

        if (item.issues?.length) {
          const issues = document.createElement("ul");
          item.issues.forEach((issue) => {
            const li = document.createElement("li");
            li.textContent = issue;
            issues.appendChild(li);
          });
          card.appendChild(issues);
        }

        list.appendChild(card);
      });

      report.appendChild(list);
      report.classList.add("is-visible");
    }

    function normalizeIssueList(value) {
      if (!value) return [];
      if (Array.isArray(value)) return value.filter(Boolean);
      if (typeof value !== "string") return [String(value)];
      const trimmed = value.trim();
      if (!trimmed) return [];
      if (trimmed.includes("\n")) {
        return trimmed.split("\n").map((line) => line.trim()).filter(Boolean);
      }
      return [trimmed];
    }

    function buildGenerationReportItems(data) {
      const validation = data.validation_report || {};
      const blockingIssues = normalizeIssueList(validation.blocking_issues);
      const warnings = normalizeIssueList(validation.warnings);
      const qcIssues = normalizeIssueList(data.qc_issues);
      const qcError = normalizeIssueList(data.qc_error);
      const items = [];

      if (blockingIssues.length) {
        items.push({
          title: "Blocking Validation Issues",
          body: "These fields still need fixes before the draft fully passes validation.",
          issues: blockingIssues
        });
      }
      if (warnings.length) {
        items.push({
          title: "Validation Warnings",
          body: "Review these warnings before publishing.",
          issues: warnings
        });
      }
      if (qcIssues.length) {
        items.push({
          title: "QC Issues",
          body: "The QC pass flagged the following items.",
          issues: qcIssues
        });
      }
      if (qcError.length) {
        items.push({
          title: "QC Error",
          body: "The QC helper encountered an error; the draft was returned fail-open.",
          issues: qcError
        });
      }

      return items;
    }

    async function callApi(path, payload) {
      const res = await fetch(path, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (!res.ok) {
        throw new Error(data.detail || JSON.stringify(data));
      }
      return data;
    }

    byId("generateBtn").addEventListener("click", async () => {
      clearReport();
      const stopTicker = startGenerationTicker();
      try {
        const payload = {
          notes: byId("notes").value
        };
        const data = await callApi("/api/generate-draft", payload);
        stopTicker();
        latestDraft = data.activity_draft;
        const qcStatus = data.qc_applied ? "passed" : "fail-open";
        byId("status").textContent = `Generated. Rewrites: ${data.rewrite_count}. Passed: ${data.validation_report.passed}. QC: ${qcStatus}`;
        renderReport(buildGenerationReportItems(data));
        renderSections(data.activity_draft);
      } catch (err) {
        stopTicker();
        byId("status").textContent = "Generation failed.";
        renderReport([{
          title: "Generation Error",
          body: "The draft could not be generated.",
          issues: normalizeIssueList(err.message)
        }]);
        byId("sections").innerHTML = "";
      }
    });

    byId("notionBtn").addEventListener("click", async () => {
      if (!latestDraft) return;
      byId("status").textContent = "Creating Notion draft...";
      try {
        const data = await callApi("/api/notion/create-draft", { activity_draft: latestDraft });
        setStatusWithNotionLink("Notion draft created: ", data.notion_url);
      } catch (err) {
        byId("status").textContent = `Notion failed: ${err.message}`;
      }
    });

  </script>
</body>
</html>
